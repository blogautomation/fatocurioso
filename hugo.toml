baseURL = "https://blogautomation.github.io/fatocurioso/"
languageCode = "pt-BR"
title = "Fato Curioso"
theme = "PaperMod"

[pagination]
  pagerSize = 10

[params]
  description = "Fatos surpreendentes, curiosidades incriveis e descobertas fascinantes sobre ciencia, historia e natureza."
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  defaultTheme = "auto"

[params.homeInfoParams]
  Title = "Fato Curioso"
  Content = "Fatos surpreendentes, curiosidades incriveis e descobertas fascinantes sobre ciencia, historia e natureza."

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menu.main]]
  name = "Sobre"
  url = "/sobre/"
  weight = 1

[[menu.main]]
  name = "Contato"
  url = "/contato/"
  weight = 2

